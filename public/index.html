<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proxmox Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Proxmox Dashboard</h1>
    <div class="header-controls">
      <button id="toggle-btn" class="toggle-btn">Show all</button>
      <span id="last-updated"></span>
    </div>
  </header>
  <main>
    <section id="alerts-panel" class="hidden">
      <h2>Alerts</h2>
      <div id="alerts-list"></div>
    </section>
    <section id="nodes-section">
      <h2>Nodes</h2>
      <div id="nodes" class="card-grid"></div>
    </section>
    <section id="vms-section">
      <h2>Virtual Machines &amp; Containers</h2>
      <div id="vms"></div>
    </section>
    <section id="logs-section">
      <h2>Recent Tasks</h2>
      <div id="logs-grid">
        <div class="log-panel" id="log-pve">
          <div class="log-header">PVE1</div>
          <div class="log-body"></div>
        </div>
        <div class="log-panel" id="log-pve2">
          <div class="log-header">PVE2</div>
          <div class="log-body"></div>
        </div>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
