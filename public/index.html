<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proxmox Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Proxmox Dashboard</h1>
    <span id="last-updated"></span>
  </header>
  <main>
    <section id="alerts-panel" class="hidden">
      <h2>Alerts</h2>
      <div id="alerts-list"></div>
    </section>
    <section id="nodes-section">
      <h2>Nodes</h2>
      <div id="nodes" class="card-grid"></div>
    </section>
    <section id="vms-section">
      <h2>Virtual Machines &amp; Containers</h2>
      <div id="vms" class="card-grid"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
